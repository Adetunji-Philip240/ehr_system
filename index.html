<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--Creating a FavIcon-->
    <link rel="icon" type="image/x-icon" href="./images/logo.png" />
    <!--Bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME LINK -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <!--Custom CSS-->
    <link rel="stylesheet" href="styles.css" />

    <style>
      body {
        background-image: url("./images/backgrnd.jpg");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
      }

      .overlay {
        background: rgba(20, 23, 194, 0.3);

        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color2);
      }

      input[type="radio"] {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div style="margin-top: 50px" class="container mx-auto w-75">
        <img src="./images/logo.png" class="mx-auto d-block logo" alt="" />

        <form action="./backend/login.php" method="POST">
          <div class="container mt-3">
            <div class="mt-3 mb-3">
              <label for="username" class="form-label">User Name</label>
              <input
                type="text"
                name="user_name"
                class="form-control"
                required
              />
            </div>
            <div class="mt-3 mb-3">
              <label for="password">Password</label>
              <input
                type="password"
                name="password"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label for="role" class="form-label">Role</label> <br />
              <input type="radio" name="role" value="Patient" required />
              <label for="patient">Patient</label> <br />

              <input type="radio" name="role" value="Doctor" required />
              <label for="doctor">Doctor</label> <br />

              <input type="radio" name="role" value="Admin" required />
              <label for="admin">Admin</label>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
      </div>
    </div>
    <!--Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--Custom JS-->
    <script src="index.js"></script>
  </body>
</html>
